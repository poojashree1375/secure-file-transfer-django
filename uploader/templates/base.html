<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <title>{% block title %}{% endblock %}</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.3/dist/lux/bootstrap.min.css">

    {% load static %}


<body>

<nav class="navbar navbar-expand-lg bg-primary" data-bs-theme="dark">
    <div class="container">
        <a class="navbar-brand" href="{% url 'upload' %}">🔐 Secure File Transfer</a>
        <div class="ms-auto">
            {% if user.is_authenticated %}
                <span class="text-white-50 me-3">{{ user.email }}</span>
                <a class="btn btn-sm btn-outline-light me-2" href="{% url 'dashboard' %}">Dashboard</a>
                <a class="btn btn-sm btn-outline-light" href="{% url 'account_logout' %}">Sign out</a>
            {% else %}
                <a class="btn btn-sm btn-outline-light me-2" href="{% url 'account_login' %}">Sign in</a>
                <a class="btn btn-sm btn-light" href="{% url 'account_signup' %}">Sign up</a>
            {% endif %}
        </div>
    </div>
</nav>

<div class="container py-5">

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
        {% endfor %}
    {% endif %}

    {% block content %}

    {% endblock %}

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
